<header class="app-header">
  <div class="header-left">
    <button class="btn btn-ghost btn-icon" (click)="toggleSidebar.emit()" title="Toggle sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <div class="header-clock">
      <span class="live-dot"></span>
      <span>{{ currentTime | date:'HH:mm:ss' }}</span>
      <span class="date-text">{{ currentTime | date:'EEE, MMM d' }}</span>
    </div>
  </div>

  <div class="header-right">
    <!-- System health -->
    <div class="health-indicator">
      <span class="health-dot"></span>
      <span>All Systems Operational</span>
    </div>

    <!-- ── Theme toggle ── -->
    <button
      class="theme-toggle"
      (click)="theme.toggle()"
      [title]="theme.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
      [attr.aria-label]="theme.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
    >
      <span class="toggle-track" [class.light]="theme.theme() === 'light'">
        <span class="toggle-thumb">
          <!-- Moon icon (dark mode active) -->
          @if (theme.theme() === 'dark') {
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
              <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/>
            </svg>
          }
          <!-- Sun icon (light mode active) -->
          @if (theme.theme() === 'light') {
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1"  x2="12" y2="3"  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="4.22" y1="4.22"  x2="5.64" y2="5.64"  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="1"  y1="12" x2="3"  y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          }
        </span>
      </span>
      <span class="toggle-label">{{ theme.theme() === 'dark' ? 'Dark' : 'Light' }}</span>
    </button>

    <!-- Alerts bell -->
    <a routerLink="/dashboard/alerts" class="alert-bell" title="View alerts">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 01-3.46 0"/>
      </svg>
      @if (unreadAlerts() > 0) {
        <span class="bell-badge">{{ unreadAlerts() }}</span>
      }
    </a>

    <!-- User chip -->
    <div class="user-chip">
      <div class="user-avatar-sm">
        {{ auth.currentUser()?.username?.charAt(0)?.toUpperCase() }}
      </div>
      <span class="user-chip-name">{{ auth.currentUser()?.username }}</span>
      <span class="badge badge-info">{{ auth.currentUser()?.role }}</span>
    </div>
  </div>
</header>
