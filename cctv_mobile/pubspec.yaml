name: cctv_mobile
description: CCTV Guard Mobile — real-time threat alerts via SignalR + Firebase push notifications
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase core + FCM push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Local notifications (show FCM payload as heads-up when app is foreground)
  flutter_local_notifications: ^17.2.2

  # SignalR — real-time alert stream from .NET backend
  signalr_netcore: ^1.3.4

  # HTTP for REST login
  http: ^1.2.1

  # JWT + server URL persistence
  shared_preferences: ^2.2.3

  # Date formatting
  intl: ^0.19.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
